<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../css/style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <title>Gym Tracker</title>
</head>

<body>
    <h1 style="text-align: center;">STATS</h1>

    <nav class="navbar">
        <ul>    
            <li><a href="index.html">HOME</a></li>
            <li><a href="stats.html">STATS TRACKER</a></li>
            <li><a href="split.html">SPLIT TRACKER</a></li>
            <li><a href="about.html">ABOUT</a></li>
        </ul>
    </nav>

<form id="statsForm">
  <label for="bodyWeight">Body Weight:</label>
  <input type="number" id="bodyWeight" name="bodyWeight" placeholder="kg">

  <table id="statsTable">
    <thead>
      <tr>
        <th>Muscle Group</th>
        <th>Weight Lifted (kg)</th>
        <th>Reps</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Chest</td>
        <td><input type="number" id="chestWeight" placeholder="kg"></td>
        <td><input type="number" id="chestReps" placeholder="reps"></td>
      </tr>
      <tr>
        <td>Back</td>
        <td><input type="number" id="backWeight" placeholder="kg"></td>
        <td><input type="number" id="backReps" placeholder="reps"></td>
      </tr>
      <tr>
        <td>Biceps</td>
        <td><input type="number" id="bicepsWeight" placeholder="kg"></td>
        <td><input type="number" id="bicepsReps" placeholder="reps"></td>
      </tr>
      <tr>
        <td>Triceps</td>
        <td><input type="number" id="tricepsWeight" placeholder="kg"></td>
        <td><input type="number" id="tricepsReps" placeholder="reps"></td>
      </tr>
      <tr>
        <td>Shoulders</td>
        <td><input type="number" id="shouldersWeight" placeholder="kg"></td>
        <td><input type="number" id="shouldersReps" placeholder="reps"></td>
      </tr>
      <tr>
        <td>Legs</td>
        <td><input type="number" id="legsWeight" placeholder="kg"></td>
        <td><input type="number" id="legsReps" placeholder="reps"></td>
      </tr>
    </tbody>
  </table>

  <button type="button" id="submit" onclick="createChart()">Submit</button>
</form>

    <canvas id="MuscleGroups" style="width:100%;max-width:550px;display: none;"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/stats.js"></script>
    
    

</body>
</html>
