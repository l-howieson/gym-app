<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../css/style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <title>Gym Tracker</title>
</head>

<body>
    <h1 style="text-align: center;">STATS</h1>

    <nav class="navbar">
        <ul>    
            <li><a href="index.html">HOME</a></li>
            <li><a href="stats.html">STATS TRACKER</a></li>
            <li><a href="split.html">SPLIT TRACKER</a></li>
            <li><a href="about.html">ABOUT</a></li>
        </ul>
    </nav>

    <form id="statsForm">
        <label for="bodyWeight">Enter Body Weight:</label>
        <input type="number" id="bodyWeight" name="bodyWeight">
        

        <label for="muscleGroup">Select Muscle Group:</label>
        <select id="muscleGroup" name="muscleGroup">
            <option value="chest">Chest</option>
            <option value="back">Back</option>
            <option value="biceps">Biceps</option>
            <option value="triceps">Triceps</option>
            <option value="shoulders">Shoulders</option>
            <option value="legs">Legs</option>
        </select>
        <br>

        <label for="weight">Enter Weight:</label>
        <input type="number" id="weight" name="weight">
        <br>

        <label for="reps">Enter Reps:</label>
        <input type="number" id="reps" name="reps">
        <br>
        <button id="submit" onclick="calculateChartData()">Submit</button>
    </form>

    <canvas id="MuscleGroups" style="width:100%;max-width:550px;display: none;"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/stats.js"></script>

    <script>
        const submitButton = document.getElementById('submit');
        submitButton.addEventListener('click', createChart);

    </script>
    
    

</body>
</html>
