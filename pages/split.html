    <h2 style="text-align: center">MANAGE YOUR WORKOUT SPLIT</h2>
    <h2 style="text-align: center">Select days you are available to workout</h2>

    <label><input type="checkbox" id="monday" class="day-checkbox" value="Monday"> Monday</label>
    <label><input type="checkbox" id="tuesday" class="day-checkbox" value="Tuesday"> Tuesday</label>
    <label><input type="checkbox" id="wednesday" class="day-checkbox" value="Wednesday"> Wednesday</label>
    <label><input type="checkbox" id="thursday" class="day-checkbox" value="Thursday"> Thursday</label>
    <label><input type="checkbox" id="friday" class="day-checkbox" value="Friday"> Friday</label>
    <label><input type="checkbox" id="saturday" class="day-checkbox" value="Saturday"> Saturday</label>
    <label><input type="checkbox" id="sunday" class="day-checkbox" value="Sunday"> Sunday</label>

    <ul id="selectedDaysOutput"></ul>
    <button type="button" onclick="outputSelectedDays()">Show Days</button>


    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
